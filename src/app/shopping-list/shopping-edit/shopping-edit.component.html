<div class="row">
  <div class="col-xs-12">
    <form [formGroup]="newIngredientForm">
      <div class="row">
        <div class="col-sm-5 form-group">
          <label for="name">Name</label>
          <input
            type="text"
            id="name"
            class="form-control"
            formControlName="name">

          <span
            class="help-block"
            *ngIf="isFieldValid('name','required')">
            Name is required!
          </span>

          <span
            class="help-block"
            *ngIf="isFieldValid('name','minlength')">
            Name must to have at least 3 characters!
          </span>
        </div>

        <div class="col-sm-2 form-group">
          <label for="amount">Amount</label>
          <input
            type="number"
            id="amount"
            class="form-control"
            formControlName="amount">

          <span
            class="help-block"
            *ngIf="isFieldValid('amount','required')">
            Amount is required!
          </span>

          <span
            class="help-block"
            *ngIf="isFieldValid('amount','min')">
            Amount must to have at least 1 unit!
          </span>
        </div>
      </div>

      <div class="row">
        <div class="col-xs-12">
          <button
            type="submit"
            class="btn btn-success"
            (click)="onActionButtonClicked()"
            [disabled]="!newIngredientForm.valid">
            {{ getLabelActionButton() }}
          </button>

          <button
            type="button"
            class="btn btn-danger"
            (click)="onDeleteItem()"
            *ngIf="editMode">
            Delete
          </button>

          <button
            type="button"
            class="btn btn-primary"
            (click)="onClear()">
            Clear
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
